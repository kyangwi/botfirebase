<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Chat</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Apache ECharts (interactive charts) -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg: #343541;
            --panel: #202123;
            --panel-border: #2a2b32;
            --text: #ececf1;
            --muted: #a7a7b6;
            --bot-bubble: #40414f;
            --bot-bubble-border: #2a2b32;
            --user-bubble: #15173D;
            --user-bubble-2: #151740;
            --user-bubble-border: #050c1e;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            /* Dark theme chat bg */
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles — fluid width that scales with the viewport */
        #sidebar {
            /* min 200px, preferred 20vw, max 300px */
            width: clamp(200px, 20vw, 300px);
            background-color: var(--panel);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #4d4d4f;
            flex-shrink: 0;
            transition: width 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                        min-width 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.28s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.28s;
            overflow: hidden;
        }

        /* Collapsed state */
        #sidebar.collapsed {
            width: 0;
            min-width: 0;
            border-right-color: transparent;
        }

        /* ── Mobile: overlay / drawer mode (≤ 768px) ── */
        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                z-index: 200;
                width: clamp(240px, 75vw, 320px);
                transform: translateX(0);
                box-shadow: 4px 0 24px rgba(0,0,0,0.5);
            }
            #sidebar.collapsed {
                width: clamp(240px, 75vw, 320px); /* keep width, just slide off-screen */
                transform: translateX(-100%);
                border-right-color: #4d4d4f;
            }
            /* Backdrop shown when sidebar is open on mobile */
            #sidebar-backdrop {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 199;
                background: rgba(0,0,0,0.45);
                backdrop-filter: blur(2px);
                animation: fadeIn 0.2s ease;
            }
            #sidebar-backdrop.visible { display: block; }
            @keyframes fadeIn {
                from { opacity: 0; }
                to   { opacity: 1; }
            }
            /* On mobile, show the FAB when sidebar is collapsed so users can reopen it */
            #sidebar-open-fab {
                display: none;
            }
            #sidebar-open-fab.visible {
                display: flex !important;
            }
            /* Backdrop shown when sidebar is open on mobile */
            #sidebar-backdrop {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 199;
                background: rgba(0,0,0,0.45);
                backdrop-filter: blur(2px);
                animation: fadeIn 0.2s ease;
            }
            #sidebar-backdrop.visible { display: block; }
            @keyframes fadeIn {
                from { opacity: 0; }
                to   { opacity: 1; }
            }
        }

        /* ── Mobile Input box adjustments (≤ 600px) ── */
        @media (max-width: 600px) {
            #message-form {
                padding: 10px 10px 16px !important;
            }
            .empty-state-title {
                font-size: 22px !important;
            }
            .empty-state-subtitle {
                font-size: 13px !important;
            }
            .message-content {
                font-size: 14px !important;
                padding: 10px 12px !important;
            }
            .suggestion-chip {
                white-space: normal !important;
                word-break: break-word;
            }
        }

        /* ── Tablet: slightly narrower band ── */
        @media (min-width: 769px) and (max-width: 1100px) {
            #sidebar { width: clamp(200px, 22vw, 260px); }
        }

        /* ── Large screens ── */
        @media (min-width: 1400px) {
            #sidebar { width: clamp(260px, 18vw, 320px); }
        }

        /* Sidebar top bar — Logo left, actions right */
        #sidebar-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 10px 6px;
            flex-shrink: 0;
            gap: 8px;
        }

        /* Logo group */
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            flex-shrink: 0;
        }
        .sidebar-logo-icon {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(108,99,255,0.35);
        }
        .sidebar-logo-icon svg { fill: #fff; }
        .sidebar-logo-text {
            font-size: 14px;
            font-weight: 700;
            color: #ececf1;
            white-space: nowrap;
            letter-spacing: -0.2px;
        }

        /* Right-side icon action group */
        .sidebar-topbar-actions {
            display: flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }

        /* Shared icon button style */
        .sidebar-icon-btn {
            background: none;
            border: none;
            color: #8e8ea0;
            cursor: pointer;
            padding: 7px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.18s, color 0.18s;
            text-decoration: none;
        }
        .sidebar-icon-btn:hover {
            background: rgba(255,255,255,0.08);
            color: #ececf1;
        }

        /* Keep specific IDs pointing to shared style */
        #sidebar-toggle  { background: none; border: none; }
        #sidebar-search-btn { background: none; border: none; }

        /* Floating re-open button shown when sidebar is collapsed */
        #sidebar-open-fab {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 100;
            background: var(--panel);
            border: 1px solid #4d4d4f;
            color: #8e8ea0;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 0.18s, color 0.18s, opacity 0.2s, transform 0.2s;
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }
        #sidebar-open-fab:hover {
            background: #2a2b32;
            color: #ececf1;
        }
        #sidebar-open-fab.visible {
            display: flex;
            animation: fadeInLeft 0.22s ease;
        }
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-8px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        #sidebar-header {
            padding: 20px;
            text-align: center;
        }

        #history-search {
            /* width: calc(100% - 30px); */
            margin: 6px 15px 4px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #3b3d44;
            background: #2a2b32;
            color: #e5e7eb;
            font-size: 13px;
            outline: none;
        }

        #history-search::placeholder {
            color: #8e8ea0;
        }

        #history-search-count {
            font-size: 11px;
            color: #8e8ea0;
            padding: 0 15px 6px;
        }

        #new-chat-btn {
            background-color: #343541;
            color: white;
            border: 1px solid #565869;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            width: 90%;
            margin: 10px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        #new-chat-btn:hover {
            background-color: #40414f;
        }

        #session-list {
            flex: 1;
            overflow-y: auto;
            list-style-type: none;
            padding: 10px;
            margin: 0;
            background-color: var(--panel);
            scrollbar-width: thin;
            scrollbar-color: #565869 var(--panel);
        }

        #session-list::-webkit-scrollbar {
            width: 8px;
        }

        #session-list::-webkit-scrollbar-button {
            display: none;
            width: 0;
            height: 0;
        }

        #session-list::-webkit-scrollbar-thumb {
            background-color: #565869;
            border-radius: 4px;
        }

        #session-list::-webkit-scrollbar-track {
            background-color: var(--panel);
        }

        .session-item {
            padding: 12px 15px;
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 5px;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ececf1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* group; - removed stray text */
        }

        .session-item:hover {
            background-color: #2a2b32;
        }

        .session-item.active {
            background-color: #343541;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #8e8ea0;
            cursor: pointer;
            padding: 2px;
            display: none;
            /* Hidden by default */
            font-size: 14px;
        }

        .session-item:hover .delete-btn {
            display: block;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        /* Main Chat Area Styles */
        #main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg);
            position: relative;
            min-width: 0;
            overflow: hidden;
        }

        #main-chat.centered-layout {
            --centered-composer-width: min(860px, calc(100vw - 32px));
        }

        #main-chat.centered-layout #chat-box {
            justify-content: flex-start;
            align-items: stretch;
            padding: 24px 16px 40px;
            width: 100%;
            box-sizing: border-box;
        }

        #main-chat.centered-layout #message-form {
            position: absolute;
            left: 0;
            right: 0;
            top: 58%;
            transform: translateY(-50%);
            background-image: none;
            padding: 0 24px;
        }

        #main-chat.centered-layout #message-form .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        #main-chat.centered-layout .empty-state {
            margin-top: auto;
            margin-bottom: 42%;
        }

        /* Chat box — always centered column */
        #chat-box {
            flex: 1 1 auto;
            min-height: 0;
            padding: 24px 16px 40px;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            background-image: radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.04), transparent 35%),
                radial-gradient(circle at 90% 0%, rgba(31, 111, 235, 0.08), transparent 40%);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 18px;
            width: 100%;
            box-sizing: border-box;
        }

        .empty-state {
            width: min(var(--centered-composer-width, 860px), 100%);
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
            padding: 18px 12px 22px;
            box-sizing: border-box;
        }

        .empty-state-dynamic {
            height: 170px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .empty-state-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.01em;
            color: #f9fafb;
            margin-bottom: 12px;
        }

        .empty-state-subtitle {
            font-size: 15px;
            line-height: 1.7;
            color: #c5c8d3;
            max-width: 720px;
            margin: 0 auto 10px;
        }

        .empty-state-subtitle.analysis {
            font-size: 14px;
            color: #aeb4c5;
            margin-top: 2px;
        }

        .empty-state-suggestions {
            margin-top: 18px;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .empty-suggestion-chip {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #f3f4f6;
            padding: 8px 10px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.12s ease, background 0.12s ease, border 0.12s ease;
            user-select: none;
            white-space: normal;
            text-align: left;
        }

        .empty-suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.22);
            transform: translateY(-1px);
        }

        #chat-box::-webkit-scrollbar {
            width: 8px;
        }

        #chat-box::-webkit-scrollbar-thumb {
            background-color: #565869;
            border-radius: 4px;
        }

        #chat-box::-webkit-scrollbar-track {
            background-color: transparent;
        }

        /* Every message row stays centered and scales with the viewport */
        .message {
            display: flex;
            gap: 14px;
            margin: 0 auto;
            padding: 0;
            color: #d1d5db;
            align-items: flex-start;
            width: min(100%, 860px);
            max-width: 100%;
            align-self: center;
        }

        .message-body {
            display: flex;
            flex-direction: column;
            width: auto;
            max-width: 100%;
            min-width: 0;
        }

        .message.bot {
            background-color: transparent;
        }

        /* Reset for user to alignment */
        .message.user {
            justify-content: flex-end;
        }

        .message.no-match {
            display: none;
        }

        .message.match {
            outline: 1px solid rgba(255, 255, 255, 0.12);
            outline-offset: 4px;
            border-radius: 16px;
        }

        .message-content {
            max-width: 100%;
            line-height: 1.6;
            font-size: 16px;
            padding: 14px 18px;
            border-radius: 14px;
            box-shadow: var(--shadow);
            border: 1px solid transparent;
            position: relative;
            background: var(--bot-bubble);
            word-break: break-word;
            overflow-wrap: break-word;
        }

        .message-content > *:first-child {
            margin-top: 0;
        }

        .message-content > *:last-child {
            margin-bottom: 0;
        }

        .message.bot .message-body {
            width: 100%;
            max-width: min(100%, 860px);
            min-width: 0;
        }

        .message.bot .message-content {
            border: none;
            box-shadow: none;
            background: transparent;
            width: 100%;
            max-width: 100%;
        }

        .message.bot.loading .message-body,
        .message.bot.loading .message-content {
            width: auto;
        }

        .message.user .message-content {
            color: white;
            border-color: #2b2f3a;
            background: linear-gradient(135deg, #2b2f3a, #1f2330);
            max-width: min(100%, 720px);
            margin-left: auto;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            margin-right: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .bot .avatar {
            background: linear-gradient(135deg, #10a37f, #0f766e);
            /* OpenAI green-ish */
            color: white;
        }

        .user .avatar {
            background: linear-gradient(135deg, #2b2f3a, #1f2330);
            color: white;
        }

        .message.user .avatar {
            order: 2;
            margin-left: 6px;
            margin-right: 0;
        }

        .message.user .message-content {
            order: 1;
            text-align: right;
        }

        .message.user .message-body {
            align-items: flex-end;
        }

        .message-actions {
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            padding-left: 18px;
        }

        .message.user .message-actions {
            justify-content: flex-end;
            padding-left: 0;
            padding-right: 18px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: translateY(-2px);
            transition: opacity 0.12s ease, transform 0.12s ease, visibility 0.12s ease;
        }

        .message.user:hover .message-actions,
        .message.user:focus-within .message-actions {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateY(0);
        }

        .msg-action-btn {
            background: transparent;
            border: 1px solid transparent;
            color: #d1d5db;
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 999px;
            cursor: pointer;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background 0.12s ease, border 0.12s ease, transform 0.12s ease;
        }

        .msg-action-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.9;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
            opacity: 0.95;
        }

        .msg-action-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.28);
            color: #f3f4f6;
            transform: translateY(-1px);
        }

        .msg-action-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            background: transparent;
            border-color: transparent;
        }

        .msg-action-btn::after {
            content: attr(data-label);
            position: absolute;
            left: 50%;
            bottom: calc(100% + 8px);
            transform: translateX(-50%) translateY(2px);
            background: rgba(17, 24, 39, 0.96);
            color: #f9fafb;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            font-size: 11px;
            line-height: 1;
            padding: 5px 7px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.12s ease, transform 0.12s ease;
            z-index: 3;
        }

        .msg-action-btn:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .message-actions.hidden {
            display: none;
        }

        .msg-action-btn.active {
            background: rgba(16, 163, 127, 0.2);
            border-color: rgba(16, 163, 127, 0.65);
            color: #ecfdf5;
        }

        .msg-action-btn.negative.active {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.65);
            color: #fee2e2;
        }

        .msg-action-more {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .msg-action-menu {
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            display: none;
            gap: 4px;
            padding: 6px;
            border-radius: 10px;
            background: rgba(17, 24, 39, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.14);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
            z-index: 5;
        }

        .msg-action-more.open .msg-action-menu {
            display: inline-flex;
        }

        /* Input form — always centered, matching the message column */
        #message-form {
            display: flex;
            justify-content: center;
            padding: 20px 24px 28px;
            background-color: transparent;
            background-image: linear-gradient(180deg, rgba(53, 55, 64, 0), #353740 58.85%);
            position: relative;
        }

        #message-form .input-wrapper {
            width: 100%;
            max-width: 800px; /* matches message max-width */
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            display: flex;
            background-color: #40414f;
            border: 1px solid rgba(32, 33, 35, .5);
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            padding: 10px;
        }

        #message-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 16px;
            padding: 5px 10px;
            outline: none;
            resize: none;
            max-height: 200px;
        }

        #send-button {
            background-color: transparent;
            color: #d1d5db;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            align-self: flex-end;
            /* Align bottom if textarea grows */
        }

        #send-button:hover {
            color: white;
            background-color: #202123;
        }

        /* Markdown Styles for Bot */
        .message-content pre {
            background: #202123 !important;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            max-width: 100%;
            box-sizing: border-box;
        }

        .message-content code {
            font-family: 'Consolas', 'Monaco', monospace;
        }

        .message-content table {
            display: block;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 14px;
        }

        .message-content th,
        .message-content td {
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 6px 8px;
            text-align: left;
            vertical-align: top;
        }

        .message-content th {
            background: rgba(255, 255, 255, 0.06);
            font-weight: 600;
        }

        .message.loading .message-content {
            background: #2a2b32;
            border-color: #3b3d44;
        }

        .loading-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #c7c7d1;
            font-size: 14px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9aa0ab;
            opacity: 0.4;
            animation: pulse 1s infinite;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.35; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-2px); }
        }

        .message-content h3 {
            margin: 14px 0 8px;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .message-content ul {
            margin: 8px 0 0 18px;
            padding: 0;
        }

        .message-content li {
            margin: 6px 0;
        }

        .analysis-block {
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px dashed rgba(255, 255, 255, 0.15);
            position: relative;
        }

        .analysis-toggle {
            position: absolute;
            top: 8px;
            right: 0;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #e5e7eb;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.12s ease, border 0.12s ease;
        }

        .analysis-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.22);
        }

        .analysis-title {
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin: 0 0 10px;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-start;
        }

        .suggestion-chip {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #f3f4f6;
            padding: 8px 10px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.12s ease, background 0.12s ease, border 0.12s ease;
            user-select: none;
            white-space: nowrap;
            width: fit-content;
        }

        .suggestion-chip:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.22);
            transform: translateY(-1px);
        }

        .drilldown-panel {
            margin-top: 10px;
            display: grid;
            gap: 10px;
        }

        .drilldown-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .drilldown-toggle {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            color: #e5e7eb;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.12s ease, border 0.12s ease;
        }

        .drilldown-toggle:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.22);
        }

        .drilldown-group {
            background: rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 10px;

        .group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .group-icon {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.08);

        .group-icon svg {
            width: 14px;

        .suggestion-card {

            padding: 10px 12px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.12s ease, background 0.12s ease, border 0.12s ease;
            user-select: none;
            text-align: left;
            white-space: normal;
            max-width: 100%;
        }

        .suggestion-card:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.04));
            border-color: rgba(255, 255, 255, 0.24);

        .chart-block {
            margin-top: 12px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;

            max-width: 100% !important;

            box-sizing: border-box;

        .chart-header {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 8px;
        }

        .chart-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;

        .chart-download-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: transparent;
            border: 1px solid transparent;
            color: #d1d5db;
            width: 28px;
            height: 28px;
            border-radius: 999px;
            position: relative;
            transition: background 0.12s ease, border 0.12s ease, transform 0.12s ease, color 0.12s ease;
        }

        .chart-download-icon svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.9;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none;
        }

        .chart-download-icon:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.28);
            color: #f3f4f6;
            transform: translateY(-1px);
        }

        .chart-download-icon::after {
            content: attr(data-label);
            position: absolute;
            left: 50%;
            bottom: calc(100% + 8px);
            transform: translateX(-50%) translateY(2px);
            background: rgba(17, 24, 39, 0.96);
            color: #f9fafb;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            font-size: 11px;
            line-height: 1;
            padding: 5px 7px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.12s ease, transform 0.12s ease;
            z-index: 3;
        }

        .chart-download-icon:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .echarts-container {
            width: 100% !important;
            max-width: 100% !important;
            min-width: 0 !important;
            height: 340px;
            border-radius: 10px;
            display: block;
        }

        .echarts-container canvas,
        .echarts-container div {
            max-width: 100% !important;
        }


        /* User footer in sidebar */
        #sidebar-user-footer {
            padding: 12px 14px;
            border-top: 1px solid #2a2b32;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .user-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            letter-spacing: 0.5px;

        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-size: 13px;
            font-weight: 600;
            color: #ececf1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-size: 11px;
            color: #8e8ea0;

        #logout-btn {
            background: none;
            border: none;
            color: #8e8ea0;

            padding: 6px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;

        }

        #logout-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

    </style>
</head>

                style="width:100%; padding:8px 10px; border-radius:8px; border:1px solid #3b3d44;
                       background:#2a2b32; color:#e5e7eb; font-size:13px; outline:none; box-sizing:border-box; font-family:inherit;">

    {{ dataset_intro_overview|default:""|json_script:"intro-data" }}
    {{ dataset_intro_analysis|default:""|json_script:"analysis-data" }}
    {{ dataset_intro_suggestions|default:"[]"|json_script:"suggestions-data" }}

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            window.activeECharts = window.activeECharts || [];

            function resizeAllCharts() {
                if (window.activeECharts) {
                    window.activeECharts = window.activeECharts.filter(function (chart) {
                        if (chart && !chart.isDisposed()) {
                            try {
                                chart.resize();
                            } catch (e) {
                                console.error('ECharts resize error:', e);
                            }
                            return true;
                        }
                        return false;
                    });
                }
            }

            var currentSessionId = null;
            var currentSearchTerm = '';
            var pendingResponseEl = null;
            var initialSharedSessionId = new URLSearchParams(window.location.search).get('session');
            var pendingSharedMessageId = new URLSearchParams(window.location.search).get('message');
            var datasetIntroText = JSON.parse(document.getElementById('intro-data').textContent);
            var datasetAnalysisText = JSON.parse(document.getElementById('analysis-data').textContent);
            var datasetSuggestions = JSON.parse(document.getElementById('suggestions-data').textContent);
            var datasetIntroRequested = false;
            var emptyStateTypingTimer = null;
            var emptyStateTypingToken = 0;
            var emptyStatePauseTimer = null;

            function loadSessions(options) {
                var autoSelect = options && options.autoSelect;
                var createIfEmpty = options && options.createIfEmpty;
                $.get('/get_sessions', function (response) {
                    var list = $('#session-list');
                    list.empty();
                    response.sessions.forEach(function (session) {
                        var activeClass = (session.id === currentSessionId) ? 'active' : '';
                        var item = `
                             <li class="session-item ${activeClass}" data-session-id="${session.id}" onclick="selectSession('${session.id}')">
                                 <span style="overflow: hidden; text-overflow: ellipsis;">${session.title}</span>
                                 <button class="delete-btn" onclick="deleteSession(event, '${session.id}')">
                                     <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="14" width="14" xmlns="http://www.w3.org/2000/svg"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                 </button>
                             </li>
                         `;
                        list.append(item);
                    });

                    if (autoSelect) {
                        var hasCurrent = currentSessionId && response.sessions.some(function (s) { return s.id === currentSessionId; });
                        if (!hasCurrent) {
                            if (response.sessions.length > 0) {
                                selectSession(response.sessions[0].id);
                            } else if (createIfEmpty) {
                                startNewChat();
                            }
                        }
                    }
                });
            }

            // Exposed function for onclick
            window.selectSession = function (sessionId) {
                if (currentSessionId === sessionId) return;
                loadChat(sessionId);
            }

            window.deleteSession = function (event, sessionId) {
                event.stopPropagation(); // Prevent clicking the item
                if (!confirm("Delete this chat?")) return;

                $.ajax({
                    url: '/delete_chat/' + sessionId,
                    type: 'DELETE',
                    success: function (result) {
                        if (currentSessionId === sessionId) {
                            // Deleted current session
                            currentSessionId = null;
                            $('#chat-box').empty();
                            loadSessions({ autoSelect: true, createIfEmpty: false });
                        } else {
                            loadSessions();
                        }
                    }
                });
            }

            function setComposerLayout(centered) {
                $('#main-chat').toggleClass('centered-layout', !!centered);
            }

            function stopEmptyStateTyping() {
                if (emptyStateTypingTimer) {
                    clearTimeout(emptyStateTypingTimer);
                    emptyStateTypingTimer = null;
                }
                if (emptyStatePauseTimer) {
                    clearTimeout(emptyStatePauseTimer);
                    emptyStatePauseTimer = null;
                }
            }

            function typeTextByWords($target, text, speedMs, done) {
                if (!$target || $target.length === 0) return;
                var content = (text || '').trim();
                $target.text('');
                if (!content) return;

                stopEmptyStateTyping();
                emptyStateTypingToken += 1;
                var token = emptyStateTypingToken;
                var words = content.split(/\s+/).filter(Boolean);
                var i = 0;
                var delay = (typeof speedMs === 'number') ? speedMs : 45;

                function step() {
                    if (token !== emptyStateTypingToken) return;
                    if (i >= words.length) {
                        emptyStateTypingTimer = null;
                        if (typeof done === 'function') done();
                        return;
                    }
                    var next = $target.text();
                    $target.text(next ? (next + ' ' + words[i]) : words[i]);
                    i += 1;
                    emptyStateTypingTimer = setTimeout(step, delay);
                }

                step();
            }

            function eraseTextByWords($target, speedMs, done) {
                if (!$target || $target.length === 0) return;
                var current = ($target.text() || '').trim();
                if (!current) {
                    if (typeof done === 'function') done();
                    return;
                }

                stopEmptyStateTyping();
                emptyStateTypingToken += 1;
                var token = emptyStateTypingToken;
                var words = current.split(/\s+/).filter(Boolean);
                var delay = (typeof speedMs === 'number') ? speedMs : 120;

                function step() {
                    if (token !== emptyStateTypingToken) return;
                    if (words.length === 0) {
                        $target.text('');
                        emptyStateTypingTimer = null;
                        if (typeof done === 'function') done();
                        return;
                    }
                    words.pop();
                    $target.text(words.join(' '));
                    emptyStateTypingTimer = setTimeout(step, delay);
                }

                step();
            }

            function buildCapabilitiesText(baseText) {
                var text = (baseText || '').trim();
                if (!text) {
                    text = 'You can run trend analysis, drill-downs, generate graphs, and share conversations.';
                }
                if (!/graph|chart/i.test(text)) {
                    text += ' You can also generate graphs.';
                }
                if (!/share/i.test(text)) {
                    text += ' You can also share conversation links.';
                }
                return text;
            }

            function renderEmptyStateSuggestions(items) {
                var suggestions = Array.isArray(items) ? items : [];
                var chips = suggestions.slice(0, 8).map(function (item) {
                    var safe = escapeHtml(String(item || '').trim());
                    if (!safe) return '';
                    return `<button type="button" class="empty-suggestion-chip" data-suggestion="${safe}">${safe}</button>`;
                }).join('');
                $('#chat-box .empty-state-suggestions').html(chips);
            }

            function typeEmptyStateText(overviewText, analysisText) {
                var $line = $('#chat-box .empty-state-subtitle.overview');
                if ($line.length === 0) return;

                var overview = (overviewText || '').trim();
                var capabilities = buildCapabilitiesText(analysisText);
                var slowSpeed = 130;

                typeTextByWords($line, overview, slowSpeed, function () {
                    emptyStatePauseTimer = setTimeout(function () {
                        eraseTextByWords($line, slowSpeed, function () {
                            typeTextByWords($line, capabilities, slowSpeed);
                        });
                    }, 5000);
                });
            }

            function renderEmptyState() {
                setComposerLayout(true);
                var intro = datasetIntroText || 'Loading a quick overview of your dataset...';
                var analysis = datasetAnalysisText || '';
                var html = `
                    <div class="empty-state">
                        <div class="empty-state-dynamic">
                            <div class="empty-state-title">Chat With Your Data</div>
                            <div class="empty-state-subtitle overview"></div>
                        </div>
                        <div class="empty-state-suggestions"></div>
                    </div>
                `;
                $('#chat-box').html(html);
                $('#chat-box').scrollTop(0);
                typeEmptyStateText(intro, analysis);
                renderEmptyStateSuggestions(datasetSuggestions);
                fetchDatasetIntro();
            }

            function clearEmptyState() {
                setComposerLayout(false);
                stopEmptyStateTyping();
                emptyStateTypingToken += 1;
                $('#chat-box .empty-state').remove();
            }

            function fetchDatasetIntro() {
                if (datasetIntroText && datasetAnalysisText) return;
                if (datasetIntroRequested) return;
                datasetIntroRequested = true;
                $.get('/dataset_intro', function (response) {
                    var text = (response && response.text) ? String(response.text).trim() : '';
                    var analysis = (response && response.analysis) ? String(response.analysis).trim() : '';
                    var suggestions = (response && Array.isArray(response.suggestions)) ? response.suggestions : [];
                    if (text) datasetIntroText = text;
                    if (analysis) datasetAnalysisText = analysis;
                    if (suggestions.length) datasetSuggestions = suggestions;
                    if (text || analysis) {
                        typeEmptyStateText(datasetIntroText, datasetAnalysisText);
                    }
                    if (suggestions.length) {
                        renderEmptyStateSuggestions(datasetSuggestions);
                    }
                }).always(function () {
                    datasetIntroRequested = false;
                });
            }

            function loadChat(sessionId) {
                currentSessionId = sessionId;
                updateUrlState(sessionId, pendingSharedMessageId);

                // Update active state visual
                $('#session-list .session-item').removeClass('active');
                $('#session-list .session-item[data-session-id="' + sessionId + '"]').addClass('active');

                $.get('/get_chat/' + sessionId, function (response) {
                    $('#chat-box').empty();
                    var hasMessages = !!(response.messages && response.messages.length > 0);
                    response.messages.forEach(function (msg) {
                        appendMessage(msg.role, msg.content, {
                            typing: false,
                            chart: msg.chart,
                            messageId: msg.id,
                            feedback: msg.feedback
                        });
                    });
                    if (!hasMessages) {
                        renderEmptyState();
                    } else {
                        setComposerLayout(false);
                    }
                    maybeFocusSharedMessage();
                    applyHistorySearch(currentSearchTerm);
                    if (hasMessages) {
                        $('#chat-box').scrollTop($('#chat-box')[0].scrollHeight);
                    } else {
                        $('#chat-box').scrollTop(0);
                    }
                    refreshRegenerateButtons();
                }).fail(function () {
                    if (sessionId === initialSharedSessionId) {
                        startNewChat();
                    }
                });
            }

            function appendMessage(role, text, options) {
                var isBot = role === 'bot';
                var typing = options && options.typing;
                var speedMs = (options && options.speedMs) || 30;
                var chart = options && options.chart;
                var messageId = options && options.messageId;
                var feedback = options && options.feedback;
                var localToken = options && options.localToken;

                var msgHtml = `
                    <div class="message ${role}" ${messageId ? `data-message-id="${messageId}"` : ''} ${localToken ? `data-local-token="${localToken}"` : ''}>
                        <div class="message-body">
                            <div class="message-content">
                                <div class="message-main"></div>
                            </div>
                            <div class="message-actions"></div>
                        </div>
                    </div>
                `;

                var $msg = $(msgHtml);
                $msg.data('rawText', text || '');
                $('#chat-box').append($msg);
                renderMessageActions($msg, role, feedback);
                setMessageActionsVisible($msg, !typing);

                if (typing) {
                    if (isBot) {
                        typeBotMessage($msg.find('.message-main'), text, speedMs, chart, function () {
                            wireSuggestionChips($msg);
                            setMessageActionsVisible($msg, true);
                        });
                    } else {
                        typeUserMessage($msg.find('.message-main'), text, speedMs, function () {
                            setMessageActionsVisible($msg, true);
                        });
                    }
                } else {
                    if (isBot) {
                        $msg.find('.message-main').html(formatBotMessage(text));
                        wireSuggestionChips($msg);
                        if (chart) {
                            appendChart($msg.find('.message-main'), chart);
                        }
                    } else {
                        $msg.find('.message-main').text(text);
                    }
                }
                if (currentSearchTerm) {
                    applyHistorySearch(currentSearchTerm);
                }
                refreshRegenerateButtons();
            }

            function typeBotMessage($container, text, speedMs, chart, done) {
                // Pre-split once from the full final text, then stream only the response part.
                // This prevents raw suggestive-analysis bullets from appearing during typing.
                var fullSplit = splitSuggestiveAnalysis(text);
                var streamText = stripResponsePrefix(fullSplit ? fullSplit.response : text);
                var tokens = streamText.match(/(\s+|[^\s]+)/g) || [];
                var current = '';
                var i = 0;
                var delay = (typeof speedMs === 'number') ? speedMs : 30;
                var renderEveryTokens = 1;

                function step() {
                    if (i >= tokens.length) {
                        $container.html(formatBotMessage(text));
                        if (chart) {
                            appendChart($container, chart);
                        }
                        if (typeof done === 'function') done();
                        return;
                    }
                    current += tokens[i];
                    // Render markdown progressively while typing for a smoother formatted stream.
                    if (i % renderEveryTokens === 0 || i === tokens.length - 1) {
                        $container.html(formatBotMessage(current, { partial: true }));
                    }
                    i += 1;
                    $('#chat-box').scrollTop($('#chat-box')[0].scrollHeight);
                    setTimeout(step, delay);
                }

                step();
            }

            function typeUserMessage($container, text, speedMs, done) {
                var words = text.split(/\s+/);
                var current = '';
                var i = 0;
                var delay = (typeof speedMs === 'number') ? speedMs : 20;

                function step() {
                    if (i >= words.length) {
                        if (typeof done === 'function') done();
                        return;
                    }
                    current += (i === 0 ? '' : ' ') + words[i];
                    $container.text(current);
                    i += 1;
                    $('#chat-box').scrollTop($('#chat-box')[0].scrollHeight);
                    setTimeout(step, delay);
                }

                step();
            }

            function formatBotMessage(text, options) {
                var partial = options && options.partial;
                if (partial) {
                    // During streaming, hide the raw "Suggestive Analysis" section to avoid
                    // showing interim markdown bullets before final styled rendering.
                    var partialSplit = splitSuggestiveAnalysis(text);
                    var partialText = stripResponsePrefix(partialSplit ? partialSplit.response : text);
                    return renderStreamingText(partialText);
                }
                var sanitized = stripStandaloneMarkdownMarkers(text || '');
                var split = splitSuggestiveAnalysis(sanitized);
                if (!split) return marked.parse(stripResponsePrefix(sanitized));

                var responseHtml = marked.parse(stripResponsePrefix(split.response));
                var chipsHtml = buildSuggestionChips(split.suggestions);
                var groupedHtml = buildDrilldownPanel(split.suggestions, split.response + '\n' + split.suggestions.join(' '));
                return `
                    ${responseHtml}
                    <div class="analysis-block">
                        <div class="analysis-title">Suggestive Analysis</div>
                        <button type="button" class="analysis-toggle" style="display:none">Show chart</button>
                        <div class="suggestions">${chipsHtml}</div>
                        ${groupedHtml}
                    </div>
                `;
            }

            function renderStreamingText(text) {
                var lines = (text || '').split(/\r?\n/);
                var htmlParts = [];
                var mdBuffer = [];

                function flushMarkdown() {
                    if (mdBuffer.length === 0) return;
                    var block = stripStandaloneMarkdownMarkers(mdBuffer.join('\n'));
                    if (!block.trim()) {
                        mdBuffer = [];
                        return;
                    }
                    htmlParts.push(marked.parse(block));
                    mdBuffer = [];
                }

                var i = 0;
                while (i < lines.length) {
                    var line = lines[i] || '';
                    var next = (i + 1 < lines.length) ? (lines[i + 1] || '') : '';
                    var isLastLine = (i === lines.length - 1);

                    if (isTableRowLine(line) && isTableSeparatorLine(next)) {
                        flushMarkdown();
                        var tableHeader = parseTableRow(line);
                        i += 2; // Skip header + separator

                        var tableRows = [];
                        while (i < lines.length && isTableRowLine(lines[i])) {
                            tableRows.push(parseTableRow(lines[i]));
                            i += 1;
                        }

                        htmlParts.push(renderStreamingTable(tableHeader, tableRows));
                        continue;
                    }

                    // During streaming, render a probable header row as a table immediately
                    // so users don't see raw markdown pipes while waiting for more tokens.
                    if (isPotentialTableHeaderLine(line)) {
                        flushMarkdown();
                        htmlParts.push(renderStreamingTable(parseTableRow(line), []));
                        i += 1;
                        continue;
                    }

                    // Ignore unfinished table fragments at the tail while streaming to avoid
                    // flashing raw markdown between header and first data row.
                    if (isLastLine && looksLikePartialTableFragment(line)) {
                        i += 1;
                        continue;
                    }

                    // Hide separator-like markdown lines that are not part of a completed table yet.
                    if (isTableSeparatorFragment(line)) {
                        i += 1;
                        continue;
                    }

                    mdBuffer.push(line);
                    i += 1;
                }

                flushMarkdown();
                return htmlParts.join('');
            }

            function normalizeTableLine(line) {
                return (line || '')
                    .trim()
                    .replace(/^\*\*+\s*/, '')
                    .replace(/\s*\*\*+$/, '')
                    .replace(/^__+\s*/, '')
                    .replace(/\s*__+$/, '')
                    .trim();
            }

            function isTableSeparatorLine(line) {
                var t = normalizeTableLine(line);
                return /^\|?[\s:-]+(?:\|[\s:-]+)+\|?$/.test(t);
            }

            function isTableRowLine(line) {
                var t = normalizeTableLine(line);
                if (!t || isTableSeparatorLine(t)) return false;
                var pipes = (t.match(/\|/g) || []).length;
                return pipes >= 1 && (/^\|/.test(t) || /\|$/.test(t) || pipes >= 2);
            }

            function isPotentialTableHeaderLine(line) {
                var t = normalizeTableLine(line);
                if (!t || isTableSeparatorLine(t)) return false;
                var pipes = (t.match(/\|/g) || []).length;
                return pipes >= 2 && !/^\|?[\s-:]+\|?[\s-:|]*$/.test(t);
            }

            function isTableSeparatorFragment(line) {
                var t = normalizeTableLine(line);
                if (!t) return false;
                // Matches incomplete or complete markdown separator rows like:
                // | --- | --- |   or   | -- |
                return /\|/.test(t) && /^\|?[\s:-|]+\|?$/.test(t);
            }

            function looksLikePartialTableFragment(line) {
                var t = normalizeTableLine(line);
                if (!t) return false;
                if (isTableSeparatorFragment(t)) return true;
                if (isTableRowLine(t)) return false;
                // Any dangling pipe-based line at the end is likely incomplete markdown table text.
                return /\|/.test(t);
            }

            function parseTableRow(line) {
                var t = normalizeTableLine(line);
                if (t.startsWith('|')) t = t.slice(1);
                if (t.endsWith('|')) t = t.slice(0, -1);
                return t.split('|').map(function (c) {
                    return (c || '').trim().replace(/\\\|/g, '|');
                });
            }

            function stripStandaloneMarkdownMarkers(text) {
                return (text || '')
                    .split(/\r?\n/)
                    .filter(function (line) {
                        return !/^\s*(\*\*+|__+)\s*$/.test(line || '');
                    })
                    .join('\n');
            }

            function stripStreamingHeaderMarkdown(text) {
                return (text || '')
                    .replace(/[`*_#~]/g, '')
                    .replace(/\[(.*?)\]\((.*?)\)/g, '$1')
                    .replace(/^[-:>\s]+/, '')
                    .trim();
            }

            function renderStreamingTable(header, rows) {
                var headerCells = (header || []).map(function (c) {
                    return '<th>' + escapeHtml(stripStreamingHeaderMarkdown(c)) + '</th>';
                }).join('');

                var bodyRows = (rows || []).map(function (row) {
                    var cells = row.slice(0, header.length);
                    while (cells.length < header.length) cells.push('');
                    var rowHtml = cells.map(function (c) {
                        return '<td>' + escapeHtml(c) + '</td>';
                    }).join('');
                    return '<tr>' + rowHtml + '</tr>';
                }).join('');

                return `
                    <table>
                        <thead><tr>${headerCells}</tr></thead>
                        <tbody>${bodyRows}</tbody>
                    </table>
                `;
            }

            function escapeHtml(value) {
                return String(value || '')
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            function splitSuggestiveAnalysis(text) {
                var marker = /(?:#{1,6}\s*)?(?:\*\*|__)?\s*(?:suggestive|suggested)\s+analysis\s*(?:\*\*|__)?\s*:?\s*/i;
                var idx = text.search(marker);
                if (idx === -1) return null;
                var response = text.slice(0, idx).trim();
                var after = text.slice(idx).replace(marker, '').trim();
                var suggestions = extractSuggestions(after);
                return { response: response || text, suggestions: suggestions };
            }

            function stripResponsePrefix(text) {
                if (!text) return text;
                var cleaned = text
                    .replace(/^\s*(?:#{1,6}\s*)?(?:\*\*|__)?\s*(?:\d+\s*[\)\.\-:]\s*)?response\s*(?:\*\*|__)?\s*[:\-]?\s*/i, '');
                cleaned = cleaned.replace(/^[ \t]*(?:#{1,6}\s*)?(?:\*\*|__)?\s*(?:\d+\s*[\)\.\-:]\s*)?response\s*(?:\*\*|__)?\s*[:\-]?\s*/im, '');
                return cleaned.trimStart();
            }

            function extractSuggestions(text) {
                var lines = text.split(/\r?\n/).map(function (l) { return l.trim(); }).filter(Boolean);
                var items = [];
                lines.forEach(function (line) {
                    var cleaned = line
                        .replace(/^[-*•]\s+/, '')
                        .replace(/^\d+\.\s+/, '')
                        .replace(/^\*\*+/, '')
                        .replace(/\*\*+$/, '')
                        .replace(/^__+/, '')
                        .replace(/__+$/, '')
                        .trim();
                    if (cleaned) items.push(cleaned);
                });
                if (items.length === 0 && text) items.push(text);
                return items.slice(0, 8);
            }

            function buildSuggestionChips(items) {
                return items.map(function (item) {
                    var safe = item.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    return `<button type="button" class="suggestion-chip" data-suggestion="${safe}">${safe}</button>`;
                }).join('');
            }

            function wireSuggestionChips($root) {
                $root.find('.suggestion-chip').off('click').on('click', function () {
                    var text = $(this).data('suggestion');
                    var $input = $('#message-input');
                    $input.val(text);
                    $input.focus();
                });
                $root.find('.suggestion-card').off('click').on('click', function () {
                    var text = $(this).data('suggestion');
                    var $input = $('#message-input');
                    $input.val(text);
                    $input.focus();
                });
                $root.find('.drilldown-toggle').off('click').on('click', function () {
                    var $panel = $(this).closest('.analysis-block').find('.drilldown-panel');
                    var expanded = $panel.attr('data-expanded') === 'true';
                    $panel.attr('data-expanded', (!expanded).toString());
                    $panel.find('.drilldown-group').each(function (idx) {
                        if (idx >= 2) {
                            $(this).toggle(!expanded);
                        }
                    });
                    $(this).text(expanded ? 'Show more' : 'Show less');
                });
            }

            function renderMessageActions($msg, role, feedback) {
                var isBot = role === 'bot';
                var $actions = $msg.find('.message-actions');
                var buttons = [
                    buildActionButton('copy'),

                        buildActionButton('regenerate'),
                        buildActionButton('share'),

                $actions.html(buttons.join(''));

                    copy: 'Copy',

            function updateUrlState(sessionId, messageId) {

            async function copyText(text) {

                        $temp[0].select();

            function buildCopyPayload($msg) {

                // Remove interactive and non-response UI bits from copied content.
                $clone.find('.analysis-toggle, .drilldown-toggle, .suggestion-chip, .suggestion-card, .chart-block').remove();

                var html = $clone.html() || '';

            async function copyFormattedContent(payload) {

                var html = (payload && payload.html) ? payload.html : '';
                if (!plain && !html) return false;

                if (navigator.clipboard && window.ClipboardItem && html) {
                    try {
                        var item = new ClipboardItem({
                            'text/plain': new Blob([plain || ''], { type: 'text/plain' }),
                            'text/html': new Blob([html], { type: 'text/html' })
                        });
                        await navigator.clipboard.write([item]);
                        return true;

                    }
                }

                return copyText(plain || html);

<body>

    <script>

                        // PNG download

                // ── Legacy PNG path (fallback for stored old payloads) ──────
                } else if (chart.data) {
                    var imgSrc = 'data:' + (chart.type || 'image/png') + ';base64,' + chart.data;
                    var filename = chartKind + '-' + timestamp + '.png';
                    var html = `
                        <div class="chart-block">

                                <a class="chart-download-icon" href="${imgSrc}" download="${filename}" data-label="Download PNG" aria-label="Download PNG">
                                    <svg viewBox="0 0 24 24">
                                        <path d="M12 3v12"></path>

                                        <path d="M4 20h16"></path>
                                    </svg>

                    $container.append(html);

                var $toggle = $container.find('.analysis-toggle');

                    var $chart = $container.find('.chart-block');

                    $chart.toggle(!isVisible);
                    $toggle.text(isVisible ? 'Show chart' : 'Hide chart');
