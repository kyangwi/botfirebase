            function showLoadingMessage() {
                if (pendingResponseEl) {
                    pendingResponseEl.remove();
                }
                var loadingHtml = `
                    <div class="message bot loading">
                        <div class="avatar">A</div>
                        <div class="message-content">
                            <div class="loading-indicator">
                                <span>Searching database</span>
                                <span class="loading-dots">
                                    <span></span><span></span><span></span>
                                </span>
                            </div>
                        </div>
                    </div>
                `;
                pendingResponseEl = $(loadingHtml);
                $('#chat-box').append(pendingResponseEl);
                $('#chat-box').scrollTop($('#chat-box')[0].scrollHeight);
            }

            function clearLoadingMessage() {
                if (pendingResponseEl) {
                    pendingResponseEl.remove();
                    pendingResponseEl = null;
                }
            }

            function applyHistorySearch(term) {
                currentSearchTerm = term || '';
                var needle = currentSearchTerm.trim().toLowerCase();
                var count = 0;
                $('#chat-box .message').each(function () {
                    var text = $(this).text().toLowerCase();
                    if (!needle) {
                        $(this).removeClass('no-match match');
                        return;
                    }
                    if (text.indexOf(needle) !== -1) {
                        $(this).removeClass('no-match').addClass('match');
                        count += 1;
                    } else {
                        $(this).addClass('no-match').removeClass('match');
                    }
                });
                $('#history-search-count').text(needle ? (count + ' matches') : '');
            }

            function buildDrilldownPanel(items, contextText) {
                var groups = groupSuggestions(items);
                var order = determineGroupOrder(contextText);
                var visibleIndex = -1;
                var groupHtml = order.map(function (key) {
                    if (groups[key].length === 0) return '';
                    visibleIndex += 1;
                    var header = groupHeader(key);
                    var cards = groups[key].map(function (item) {
                        var safe = item.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        return `<button type="button" class="suggestion-card" data-suggestion="${safe}">${safe}</button>`;
                    }).join('');
                    var hiddenStyle = (visibleIndex >= 2) ? 'style="display:none"' : '';
                    return `
                        <div class="drilldown-group" ${hiddenStyle}>
                            <div class="group-header">${header}</div>
                            <div class="suggestions">${cards}</div>
                        </div>
                    `;
                }).join('');

                if (!groupHtml.trim()) return '';
                var totalGroups = order.filter(function (k) { return groups[k].length > 0; }).length;
                var showToggle = totalGroups > 2;
                return `
                    <div class="drilldown-panel" data-expanded="false">
                        ${showToggle ? `<div class="drilldown-header"><div></div><button type="button" class="drilldown-toggle">Show more</button></div>` : ''}
                        ${groupHtml}
                    </div>
                `;
            }

            function groupHeader(key) {
                var icon = '';
                var label = '';
                if (key === 'time') { icon = svgIcon('time'); label = 'Time'; }
                else if (key === 'dept') { icon = svgIcon('dept'); label = 'Dept'; }
                else if (key === 'region') { icon = svgIcon('region'); label = 'Region'; }
                else if (key === 'individual') { icon = svgIcon('individual'); label = 'Individual'; }
                else { icon = svgIcon('other'); label = 'Other'; }
                return `<span class="group-icon">${icon}</span><span>${label}</span>`;
            }

            function groupSuggestions(items) {
                var groups = { time: [], dept: [], region: [], individual: [], other: [] };
                items.forEach(function (item) {
                    var text = item.toLowerCase();
                    if (/(year|quarter|month|week|day|q[1-4]|yoy|mom|qoq|daily|weekly|monthly|quarterly|yearly)/.test(text)) {
                        groups.time.push(item);
                    } else if (/(department|dept|team|unit|division)/.test(text)) {
                        groups.dept.push(item);
                    } else if (/(region|country|city|state|district|branch|location|area|zone|geograph)/.test(text)) {
                        groups.region.push(item);
                    } else if (/(employee|staff|person|individual|agent|advisor|manager)/.test(text)) {
                        groups.individual.push(item);
                    } else {
                        groups.other.push(item);
                    }
                });
                return groups;
            }

            function determineGroupOrder(text) {
                var t = (text || '').toLowerCase();
                if (/(quarter|monthly|month|weekly|week|daily|day|yoy|mom|qoq|year|quarterly|yearly|q[1-4])/.test(t)) {
                    return ['time', 'dept', 'region', 'individual', 'other'];
                }
                if (/(department|dept|team|unit|division)/.test(t)) {
                    return ['dept', 'time', 'region', 'individual', 'other'];
                }
                if (/(region|country|city|state|district|branch|location|area|zone|geograph)/.test(t)) {
                    return ['region', 'time', 'dept', 'individual', 'other'];
                }
                if (/(employee|staff|person|individual|agent|advisor|manager)/.test(t)) {
                    return ['individual', 'time', 'dept', 'region', 'other'];
                }
                return ['time', 'dept', 'region', 'individual', 'other'];
            }

            function svgIcon(kind) {
                if (kind === 'time') {
                    return '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v6l4 2"></path></svg>';
                }
                if (kind === 'dept') {
                    return '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"></rect><path d="M7 8h10M7 12h10M7 16h6"></path></svg>';
                }
                if (kind === 'region') {
                    return '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s6-5 6-10a6 6 0 1 0-12 0c0 5 6 10 6 10z"></path><circle cx="12" cy="11" r="2.5"></circle></svg>';
                }
                if (kind === 'individual') {
                    return '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"></circle><path d="M5 20c1.5-3.5 5-5 7-5s5.5 1.5 7 5"></path></svg>';
                }
                return '<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18M3 12h18"></path></svg>';
            }

            function startNewChat() {
                $.post('/new_chat', function (response) {
                    currentSessionId = response.session_id;
                    pendingSharedMessageId = null;
                    updateUrlState(currentSessionId, null);
                    loadSessions();
                    $('#chat-box').empty();
                    response.messages.forEach(function (msg) {
                        appendMessage(msg.role, msg.content, {
                            typing: false,
                            messageId: msg.id,
                            feedback: msg.feedback
                        });
                    });
                    if (!response.messages || response.messages.length === 0) {
                        renderEmptyState();
                    } else {
                        setComposerLayout(false);
                    }
                    refreshRegenerateButtons();
                });
            }

            // Create new chat handling
            $('#new-chat-btn').click(function () {
                startNewChat();
            });

            // Initial load: open shared/deep-linked session when provided, otherwise start fresh.
            if (initialSharedSessionId) {
                currentSessionId = initialSharedSessionId;
                loadSessions();
                loadChat(initialSharedSessionId);
            } else {
                loadSessions();
                startNewChat();
            }

            $('#history-search-input').on('input', function () {
                applyHistorySearch($(this).val());
            });

            // ── Search toggle button ─────────────────────────────────
            var $searchWrap = $('#history-search');
            var $searchInput = $('#history-search-input');
            var $searchBtn = $('#sidebar-search-btn');
            var searchOpen = false;

            $searchBtn.on('click', function () {
                searchOpen = !searchOpen;
                if (searchOpen) {
                    $searchWrap.slideDown(160);
                    $searchInput.focus();
                    $searchBtn.css('color', '#ececf1');
                } else {
                    $searchWrap.slideUp(160);
                    $searchInput.val('');
                    applyHistorySearch('');
                    $searchBtn.css('color', '');
                }
            });

            // Close search on Escape
            $searchInput.on('keydown', function (e) {
                if (e.key === 'Escape') {
                    searchOpen = false;
                    $searchWrap.slideUp(160);
                    $searchInput.val('');
                    applyHistorySearch('');
                    $searchBtn.css('color', '');
                }
            });

            $(document).on('click', function (event) {
                if ($(event.target).closest('.msg-action-more').length === 0) {
                    $('.msg-action-more').removeClass('open');
                }
            });

            $('#chat-box').on('click', '.msg-action-btn', async function () {
                var $btn = $(this);
                var action = $btn.data('action');
                var $msg = $btn.closest('.message');
                var messageId = $msg.attr('data-message-id');
                var role = $msg.hasClass('bot') ? 'bot' : 'user';

                if (action === 'copy') {
                    var payload = buildCopyPayload($msg);
                    var copied = await copyFormattedContent(payload);
                    setActionTempLabel($btn, copied ? 'Copied' : 'Copy failed', 1200);
                    return;
                }

                if (action === 'share') {
                    var link = buildShareLink(currentSessionId, messageId || null);
                    var shared = await copyText(link);
                    setActionTempLabel($btn, shared ? 'Link copied' : 'Share failed', 1400);
                    return;
                }

                if (action === 'more') {
                    var $more = $btn.closest('.msg-action-more');
                    var isOpen = $more.hasClass('open');
                    $('.msg-action-more').removeClass('open');
                    if (!isOpen) $more.addClass('open');
                    return;
                }

                if (action === 'regenerate') {
                    if (role !== 'bot') return;
                    if (!currentSessionId || !messageId) return;
                    var latestBotId = getLatestBotMessageId();
                    if (!latestBotId || latestBotId !== messageId) {
                        setActionTempLabel($btn, 'Latest only', 1200);
                        return;
                    }
                    if ($btn.prop('disabled')) return;

                    $btn.prop('disabled', true).attr('data-label', 'Regenerating...');
                    $.ajax({
                        url: '/regenerate_message',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({
                            session_id: currentSessionId,
                            message_id: messageId
                        }),
                        success: function (response) {
                            var botResponseMarkdown = (response.response || []).join(" ");
                            var $main = $msg.find('.message-main');
                            $msg.data('rawText', botResponseMarkdown || '');
                            typeBotMessage($main, botResponseMarkdown, 24, response.chart, function () {
                                wireSuggestionChips($msg);
                                setMessageActionsVisible($msg, true);
                            });
                            applyFeedbackState($msg, null);
                            setActionTempLabel($btn, 'Regenerated', 1200);
                            loadSessions();
                            refreshRegenerateButtons();
                        },
                        error: function () {
                            setActionTempLabel($btn, 'Failed', 1400);
                        },
                        complete: function () {
                            $btn.attr('data-label', 'Regenerate');
                            refreshRegenerateButtons();
                        }
                    });
                    return;
                }

                if (role !== 'bot') return;
                if (action !== 'up' && action !== 'down') return;
                if (!currentSessionId || !messageId) return;

                $.ajax({
                    url: '/message_feedback',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({
                        session_id: currentSessionId,
                        message_id: messageId,
                        rating: action
                    }),
                    success: function () {
                        applyFeedbackState($msg, action);
                        $msg.find('.msg-action-more').removeClass('open');
                    }
                });
            });

            $('#chat-box').on('click', '.empty-suggestion-chip', function () {
                var text = $(this).data('suggestion');
                var $input = $('#message-input');
                $input.val(text);
                $input.focus();
            });

            $('#message-form').submit(function (event) {
                event.preventDefault();
                var message = $('#message-input').val();
                if (!message) return;
                var localToken = 'local-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);

                if (!currentSessionId) {
                    alert("Please start a new chat first!");
                    return;
                }

                $('#message-input').val('');
                clearEmptyState();
                // Scroll bottom
                $('#chat-box').scrollTop($('#chat-box')[0].scrollHeight);

                $.ajax({
                    url: '/send_message',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ 'message': message, 'session_id': currentSessionId }),
                    success: function (response) {
                        clearLoadingMessage();
                        var botResponseMarkdown = response.response.join(" ");
                        setPersistedMessageId(localToken, response.user_message_id);
                        appendMessage('bot', botResponseMarkdown, {
                            typing: true,
                            speedMs: 30,
                            chart: response.chart,
                            messageId: response.bot_message_id
                        });
                        $('#chat-box').scrollTop($('#chat-box')[0].scrollHeight);
                        loadSessions(); // Reload names if title changed
                    },
                    error: function () {
                        clearLoadingMessage();
                    }
                });

                // Send immediately; then animate user text so it feels responsive.
                appendMessage('user', message, { typing: true, speedMs: 20, localToken: localToken });
                showLoadingMessage();
            });

            // ── Sidebar collapse / expand (responsive) ───────────────────
            var sidebar     = document.getElementById('sidebar');
            var toggleBtn   = document.getElementById('sidebar-toggle');
            var openFab     = document.getElementById('sidebar-open-fab');
            var backdrop    = document.getElementById('sidebar-backdrop');
            var SIDEBAR_KEY = 'sqlchat_sidebar_collapsed';

            function isMobile() { return window.innerWidth <= 768; }

            function setSidebarCollapsed(collapsed) {
                if (collapsed) {
                    sidebar.classList.add('collapsed');
                    if (openFab) openFab.classList.add('visible');
                    if (backdrop) backdrop.classList.remove('visible');
                    if (toggleBtn) toggleBtn.title = 'Open sidebar';
                } else {
                    sidebar.classList.remove('collapsed');
                    if (openFab) openFab.classList.remove('visible');
                    // Show backdrop only on mobile when sidebar is open
                    if (backdrop) backdrop.classList.toggle('visible', isMobile());
                    if (toggleBtn) toggleBtn.title = 'Collapse sidebar';
                }
                try { localStorage.setItem(SIDEBAR_KEY, collapsed ? '1' : '0'); } catch(e) {}
                // Trigger charts resize
                resizeAllCharts();
                setTimeout(resizeAllCharts, 300);
            }

            // Restore persisted state — on mobile default to collapsed
            (function () {
                var saved;
                try { saved = localStorage.getItem(SIDEBAR_KEY); } catch(e) {}
                // If no saved preference and we're on mobile, start collapsed
                if (saved === '1' || (saved === null && isMobile())) {
                    setSidebarCollapsed(true);
                }
            })();

            if (toggleBtn) {
                toggleBtn.addEventListener('click', function () {
                    setSidebarCollapsed(!sidebar.classList.contains('collapsed'));
                });
            }
            if (openFab) {
                openFab.addEventListener('click', function () {
                    setSidebarCollapsed(false);
                });
            }
            // Tap backdrop to close on mobile
            if (backdrop) {
                backdrop.addEventListener('click', function () {
                    setSidebarCollapsed(true);
                });
            }
            // On window resize: remove backdrop if we leave mobile
            window.addEventListener('resize', function () {
                var mobile = isMobile();
                var collapsed = sidebar.classList.contains('collapsed');
                if (!mobile && backdrop) {
                    backdrop.classList.remove('visible');
                } else if (mobile && !collapsed && backdrop) {
                    backdrop.classList.add('visible');
                }
                // Auto-open sidebar when resizing up from mobile
                if (!mobile && collapsed) {
                    var saved;
                    try { saved = localStorage.getItem(SIDEBAR_KEY); } catch(e) {}
                    if (saved !== '1') setSidebarCollapsed(false);
                }
                // Trigger charts resize
                resizeAllCharts();
            });
        });
    </script>
